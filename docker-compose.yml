# CarStorms — St. John (USVI) multi-hazard early-warning worker.
# Deployable as-is on Coolify v4 (Docker Compose resource). Configure secrets in
# the Coolify environment UI; they are injected as CARSTORMS_* variables below.

services:
  carstorms:
    build:
      context: .
      dockerfile: Dockerfile
    image: carstorms:latest
    restart: unless-stopped
    # Coolify injects these from its Environment Variables UI. The .env file is
    # optional for local runs.
    env_file:
      - path: .env
        required: false
    environment:
      CARSTORMS_DIRECTUS_URL: ${CARSTORMS_DIRECTUS_URL:-https://directus.lanxys.net}
      CARSTORMS_DIRECTUS_TOKEN: ${CARSTORMS_DIRECTUS_TOKEN:-}
      CARSTORMS_TELEGRAM_BOT_TOKEN: ${CARSTORMS_TELEGRAM_BOT_TOKEN:-}
      CARSTORMS_TELEGRAM_CHANNEL_ID: ${CARSTORMS_TELEGRAM_CHANNEL_ID:-}
      CARSTORMS_LOG_JSON: ${CARSTORMS_LOG_JSON:-true}
      CARSTORMS_HEALTH_PORT: "8080"
    expose:
      - "8080"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=5).status==200 else 1)
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
